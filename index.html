
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>x1101 Workspace</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/DEX-1101/SecretNAI/refs/heads/main/avatar.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: '#09090b',
              surface: '#18181b',
              primary: '#e4e4e7',
              accent: '#3b82f6',
              themePrimary: 'var(--theme-primary)',
              themePrimaryHover: 'var(--theme-primary-hover)',
              themeBtn: 'var(--theme-btn-bg)',
              themeBtnHover: 'var(--theme-btn-hover)',
              themeBtnText: 'var(--theme-btn-text)',
              themeBorder: 'var(--theme-border)',
            },
            animation: {
              'shimmer': 'shimmer 3s ease-in-out infinite',
              'gradient': 'gradient 8s ease infinite',
            },
            keyframes: {
              'shimmer': {
                '0%': { transform: 'translateX(100%)' },
                '50%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              'gradient': {
                '0%, 100%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #09090b;
        background-image: 
          radial-gradient(at 15% 50%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
          radial-gradient(at 85% 30%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
        background-attachment: fixed;
        color: #e4e4e7;
        font-family: 'Inter', system-ui, sans-serif;
      }
      
      :root {
        --theme-primary: #ffffff;
        --theme-primary-hover: #e4e4e7;
        --theme-btn-bg: #ffffff;
        --theme-btn-hover: #e4e4e7;
        --theme-btn-text: #000000;
        --theme-border: rgba(255, 255, 255, 0.1);
      }
      
      body[data-theme="blue"] {
        --theme-primary: #3b82f6;
        --theme-primary-hover: #2563eb;
        --theme-btn-bg: #2563eb;
        --theme-btn-hover: #1d4ed8;
        --theme-btn-text: #ffffff;
        --theme-border: rgba(37, 99, 235, 0.5);
      }
      
      body[data-theme="purple"] {
        --theme-primary: #a855f7;
        --theme-primary-hover: #9333ea;
        --theme-btn-bg: #9333ea;
        --theme-btn-hover: #7e22ce;
        --theme-btn-text: #ffffff;
        --theme-border: rgba(147, 51, 234, 0.5);
      }
      
      body[data-theme="red"] {
        --theme-primary: #ef4444;
        --theme-primary-hover: #dc2626;
        --theme-btn-bg: #dc2626;
        --theme-btn-hover: #b91c1c;
        --theme-btn-text: #ffffff;
        --theme-border: rgba(220, 38, 38, 0.5);
      }

      /* Custom scrollbar for headless feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "@zip.js/zip.js": "https://esm.sh/@zip.js/zip.js@2.7.34"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
